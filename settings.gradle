pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

plugins {
	// Auto-provisions the Java 25 toolchain declared in build.gradle
	id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

// Should match your modid
rootProject.name = 'deepslatetweaks'
